<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Só Ceva - Início</title>
    <link rel="stylesheet" href="styles/inicio.css">
</head>
<body>
    <header>
        <img src="assets/image/logo/SO CEVA.png" alt="Logo Só Ceva" width="180">
        <h1>Bem-vindo ao Só Ceva</h1>
        <h3>Temporada 2025</h3>

        <hr class="linha-estilizada"> <!-- 🔹 Linha azul entre título e patrocinadores -->

        <div class="patrocinadores">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQmvTGQvi3_Sb_4ZYXZahsOxkYniFMo7wxtvA&s" alt="Viwatec" width="70" height="70">
            <img src="https://online.fliphtml5.com/ktra/xeso/files/page/1.jpg?20200612093654&20200612093654" alt="Exportação Boteco" width="70" height="70">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQCUlPoXtk4UTD5b4auMqqr89hBc9UPotzMhg&s" alt="KR Santos Personalizados" width="70" height="70">
            <img src="assets/image/logo/TEK.png" alt="TEK ServiceRS" width="70" height="70">
        </div>
    </header>

    <nav>
        <div class="menu-toggle" onclick="toggleMenu()">
            &#9776; <!-- Ícone de menu hambúrguer -->
        </div>
        <ul class="menu" id="menu">
            <li><a href="jogadores.html">Jogadores</a></li>
            <li><a href="temporada.html">Temporada</a></li>
        </ul>
    </nav>

    <main id="inicio-container">
        <h2>Início</h2>
        
        <section class="dashboard">
            <h3>Dashboard de Desempenho</h3>
            <div class="dashboard-container">
                <div class="metric">
                    <h4>Vitórias</h4>
                    <p id="vitorias-inicio">0</p>
                </div>
                <div class="metric">
                    <h4>Derrotas</h4>
                    <p id="derrotas-inicio">0</p>
                </div>
                <div class="metric">
                    <h4>Empates</h4>
                    <p id="empates-inicio">0</p>
                </div>
                <div class="metric">
                    <h4>Gols</h4>
                    <p id="gols-feitos-inicio">0</p>
                </div>
            </div>
        </section>

        <section class="goleadores">
            <h3>Goleadores da Temporada</h3>
            <table id="tabela-goleadores-inicio">
                <thead>
                    <tr>
                        <th>Jogador</th>
                        <th>Gols</th>
                    </tr>
                </thead>
                <tbody id="goleadores-lista-inicio">
                    <!-- Lista de goleadores será gerada aqui -->
                </tbody>
            </table>
        </section>
    </main>

    <script src="scripts/script.js"></script>
    <script src="scripts/automação.js"></script>

    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js")
                .then(() => console.log("Service Worker registrado com sucesso!"))
                .catch(error => console.log("Erro ao registrar Service Worker:", error));
        }
    </script>
</body>
</html>
