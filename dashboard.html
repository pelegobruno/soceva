<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Só Ceva - Início</title>
    <link rel="stylesheet" href="styles/inicio.css">
    <link rel="manifest" href="/soceva/manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>
    <header>
        <img src="assets/image/logo/SO CEVA.png" alt="Logo Só Ceva" width="180" height="auto">
        <h1>Bem-vindo ao Só Ceva</h1>
        <h3>Temporada 2025</h3>
        <div class="patrocinadores">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQmvTGQvi3_Sb_4ZYXZahsOxkYniFMo7wxtvA&s" alt="viwatec" width="20" height="100">
            <img src="https://online.fliphtml5.com/ktra/xeso/files/page/1.jpg?20200612093654&20200612093654" alt="exportação boteco" width="20" height="100">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQCUlPoXtk4UTD5b4auMqqr89hBc9UPotzMhg&s" alt="kr santos personalizados" width="20" height="50">
            <img src="assets/image/logo/TEK.png" alt="TEK ServiceRS" width="70" height="70">
        </div>
        <hr class="linha-estilizada">
    </header>
    <nav>
        <div class="menu-toggle" onclick="toggleMenu()">
            &#9776; <!-- Ícone de traço (hambúrguer) -->
        </div>
        <ul class="menu" id="menu">
            <li><a href="jogadores.html" style="color: grey; text-decoration: none;">Jogadores</a></li>
            <li><a href="temporada.html" style="color: grey; text-decoration: none;">Temporada</a></li>
            <li><a href="info.html" style="color: grey; text-decoration: none;">Informativo</a></li>
            <li><a href="login-financeiro.html" style="color: rgb(230, 54, 186); text-decoration: none;">Financeiro</a></li>
        </ul>
        <div class="logout-container">
            <i class="fas fa-sign-out-alt" onclick="logout()" style="font-size: 24px; cursor: pointer; color: grey; margin-left: 20px;"></i>
        </div>
    </nav>
    
    <main id="inicio-container">
        <h2>Início</h2>
        <section class="dashboard">
            <h3>Dashboard de Desempenho</h3>
            <div class="dashboard-container">
                <div class="metric">
                    <h4>Vitórias</h4>
                    <p id="vitorias-inicio">0</p>
                </div>
                <div class="metric">
                    <h4>Derrotas</h4>
                    <p id="derrotas-inicio">0</p>
                </div>
                <div class="metric">
                    <h4>Empates</h4>
                    <p id="empates-inicio">0</p>
                </div>
                <div class="metric">
                    <h4>Gols</h4>
                    <p id="gols-feitos-inicio">0</p>
                </div>
            </div>
        </section>

        <section class="goleadores">
            <h3>Goleadores da Temporada</h3>
            <table id="tabela-goleadores-inicio">
                <thead>
                    <tr>
                        <th>Jogador</th>
                        <th>Gols</th>
                    </tr>
                </thead>
                <tbody id="goleadores-lista-inicio">
                    <!-- A lista de goleadores será gerada aqui -->
                </tbody>
            </table>
        </section>
    </main>

    <script src="scripts/script.js"></script>
    <script src="scripts/automação.js"></script>
    
    <script>
        // Código para criar o gráfico
        const ctx = document.getElementById('financeiro-chart').getContext('2d');
        const financeiroChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho'],
                datasets: [{
                    label: 'Saldo de Caixa',
                    data: [5000, 7000, 3000, 8000, 6000, 9000],
                    borderColor: 'rgba(75, 192, 192, 1)',
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderWidth: 2,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        function logout() {
            // Redireciona para a página de login
            window.location.href = "index.html"; // Ajuste para o caminho correto do login
        }

        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js")
                .then(() => console.log("Service Worker registrado com sucesso!"))
                .catch(error => console.log("Erro ao registrar Service Worker:", error));
        }
    </script>
</body>
</html>
