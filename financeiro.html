<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro - So Ceva</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quantico&display=swap" rel="stylesheet"> <!-- Fonte financeira -->
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        nav {
            background-color: #007BFF;
            padding: 15px;
            color: white;
            text-align: center;
        }

        .menu {
            list-style: none;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .menu li {
            margin: 0 10px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .menu a:hover {
            background-color: #0056b3;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }

        h1 {
            font-family: 'Quantico', sans-serif;
            font-size: 28px;
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        .saldo-descricao {
            text-align: center;
            font-size: 18px;
            color: #555;
            margin-bottom: 5px;
        }

        .saldo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }

        .saldo {
            font-size: 32px; /* Tamanho maior */
            font-weight: bold;
        }

        .saldo.positivo {
            color: #28a745; /* Verde para saldo positivo */
        }

        .saldo.negativo {
            color: #ff5c5c; /* Vermelho vibrante para saldo negativo */
        }

        .divider {
            width: 100%;
            height: 2px;
            background-color: green; /* Cor do traço */
            margin: 10px 0; /* Margem para espaçamento */
        }

        .filter-container {
            display: none; /* Esconder inicialmente */
            flex-direction: column;
            margin-bottom: 20px;
        }

        .filter-container input,
        .filter-container button {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin: 5px 0;
        }

        .filter-button {
            margin: 0 auto; /* Centraliza o botão */
            width: 80px; /* Largura do botão */
            height: 80px; /* Altura do botão */
            background-color: transparent; /* Fundo transparente */
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%; /* Bordas arredondadas */
            background-image: url('https://w7.pngwing.com/pngs/527/359/png-transparent-beer-glasses-mug-beer-glass-food-text-thumbnail.png');
            background-size: contain; /* Ajusta para caber completamente */
            background-repeat: no-repeat; /* Não repete a imagem */
            background-position: center; /* Centraliza a imagem */
        }

        .filter-button:hover {
            background-color: rgba(255, 215, 0, 0.5); /* Cor ao passar o mouse */
        }

        .extrato {
            display: flex;
            flex-direction: column;
            margin-top: 20px;
        }

        .extrato table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .extrato th, .extrato td {
            padding: 10px;
            text-align: right;
            border-bottom: 1px solid #ddd;
        }

        .extrato th {
            background-color: #007BFF;
            color: white;
        }

        .extrato .descricao {
            text-align: left;
        }

        .entrada {
            color: #28a745; /* Verde para entradas */
        }

        .saida {
            color: #dc3545; /* Vermelho para saídas */
        }

        form {
            display: flex;
            flex-direction: column;
            margin-top: 20px;
        }

        form input,
        form select,
        form button {
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        form button {
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        form button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <nav>
        <ul class="menu">
            <li><a href="jogadores.html">Jogadores</a></li>
            <li><a href="temporada.html">Temporada</a></li>
            <li><a href="info.html">Informativo</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Financeiro Só Ceva</h1>
        <div class="saldo-descricao">Saldo Total</div>
        <div class="saldo-container">
            <div class="saldo" id="saldo">R$ 0,00</div>
        </div>
        <div class="divider"></div>

        <button class="filter-button" id="toggleFilters"></button> <!-- Botão com imagem apenas -->

        <div class="filter-container" id="filterContainer">
            <input type="date" id="dataInicio" placeholder="Data Início">
            <input type="date" id="dataFim" placeholder="Data Fim">
            <input type="text" id="descricaoFiltro" placeholder="Buscar por descrição">
            <button id="btnBuscar">Buscar</button>
        </div>

        <div class="extrato">
            <table>
                <thead>
                    <tr>
                        <th style="text-align: left;">Data</th>
                        <th>Histórico</th>
                        <th>Valor</th>
                    </tr>
                </thead>
                <tbody id="lancamentos-container">
                    <!-- Lançamentos serão adicionados aqui -->
                </tbody>
            </table>
        </div>

        <div class="extrato" id="extrato-container" style="display: none;">
            <h2>Extrato Filtrado</h2>
            <table>
                <thead>
                    <tr>
                        <th style="text-align: left;">Data</th>
                        <th>Histórico</th>
                        <th>Valor</th>
                    </tr>
                </thead>
                <tbody id="extrato-lancamentos-container">
                    <!-- Extrato filtrado será adicionado aqui -->
                </tbody>
            </table>
        </div>

        <form id="form-lancamento">
            <input type="text" id="descricao" placeholder="Descrição" required>
            <input type="number" id="valor" placeholder="Valor" required>
            <select id="tipo">
                <option value="entrada">Entrada</option>
                <option value="saida">Saída</option>
            </select>
            <button type="submit">Adicionar Lançamento</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, Timestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "financeiro-so-ceva",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID",
            measurementId: "YOUR_MEASUREMENT_ID"
        };
    
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const lancamentosCollection = collection(db, "lancamentos");
    
        function formatarMoeda(valor) {
            return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        async function atualizarExibicao(dataFiltrada) {
            const container = document.getElementById("lancamentos-container");
            container.innerHTML = "";
            let saldo = 0;
    
            dataFiltrada.forEach(lancamento => {
                const tr = document.createElement("tr");
                tr.className = lancamento.tipo;
                const dataFormatada = new Date(lancamento.data.seconds * 1000).toLocaleDateString();
                tr.innerHTML = `
                    <td style="text-align: left;">${dataFormatada}</td>
                    <td class="descricao">${lancamento.descricao}</td>
                    <td class="${lancamento.tipo}">${formatarMoeda(lancamento.valor)}</td>
                `;
                container.appendChild(tr);
    
                saldo += lancamento.tipo === "entrada" ? lancamento.valor : -lancamento.valor;
            });
    
            const saldoContainer = document.getElementById("saldo");
            saldoContainer.innerText = formatarMoeda(saldo);
            saldoContainer.className = saldo < 0 ? "saldo negativo" : "saldo positivo"; // Atualiza a classe do saldo
        }
    
        async function carregarLancamentos() {
            const q = query(lancamentosCollection, orderBy("data"));
            const querySnapshot = await getDocs(q);
            const lancamentosFirestore = querySnapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
            }));
            atualizarExibicao(lancamentosFirestore);
        }

        async function filtrarLancamentos() {
            const dataInicio = document.getElementById("dataInicio").value;
            const dataFim = document.getElementById("dataFim").value;
            const descricaoFiltro = document.getElementById("descricaoFiltro").value.toLowerCase();
    
            let q = query(lancamentosCollection);
            let extratoFiltrado = [];
    
            // Filtrar por data de início
            if (dataInicio) {
                const startDate = new Date(dataInicio);
                startDate.setHours(0, 0, 0, 0); // Define para o início do dia
                q = query(q, where("data", ">=", Timestamp.fromDate(startDate)));
            }
    
            // Filtrar por data de fim
            if (dataFim) {
                const endDate = new Date(dataFim);
                endDate.setHours(23, 59, 59, 999); // Define para o fim do dia
                q = query(q, where("data", "<=", Timestamp.fromDate(endDate)));
            }

            // Filtrar por descrição
            if (descricaoFiltro) {
                const lancamentosSnapshot = await getDocs(q);
                extratoFiltrado = lancamentosSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                    .filter(lancamento => lancamento.descricao.toLowerCase().includes(descricaoFiltro));
            } else {
                const querySnapshot = await getDocs(q);
                extratoFiltrado = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            }
            
            // Atualiza o extrato filtrado
            atualizarExtrato(extratoFiltrado);
        }

        function atualizarExtrato(lancamentos) {
            const container = document.getElementById("extrato-lancamentos-container");
            container.innerHTML = "";

            if (lancamentos.length === 0) {
                container.innerHTML = "<tr><td colspan='3'>Nenhum lançamento encontrado.</td></tr>";
            } else {
                lancamentos.forEach(lancamento => {
                    const tr = document.createElement("tr");
                    const dataFormatada = new Date(lancamento.data.seconds * 1000).toLocaleDateString();
                    tr.innerHTML = `
                        <td style="text-align: left;">${dataFormatada}</td>
                        <td class="descricao">${lancamento.descricao}</td>
                        <td class="${lancamento.tipo}">${formatarMoeda(lancamento.valor)}</td>
                    `;
                    container.appendChild(tr);
                });
            }

            document.getElementById("extrato-container").style.display = "block"; // Mostra o extrato filtrado
        }

        async function adicionarLancamento(descricao, valor, tipo) {
            await addDoc(lancamentosCollection, {
                descricao,
                valor,
                data: Timestamp.fromDate(new Date()),
                tipo
            });
            carregarLancamentos();
        }
    
        document.getElementById("form-lancamento").addEventListener("submit", (e) => {
            e.preventDefault();
            const descricao = document.getElementById("descricao").value;
            const valor = parseFloat(document.getElementById("valor").value);
            const tipo = document.getElementById("tipo").value;
            adicionarLancamento(descricao, valor, tipo);
            document.getElementById("descricao").value = '';
            document.getElementById("valor").value = '';
            document.getElementById("tipo").value = 'entrada';
        });
    
        document.getElementById("btnBuscar").addEventListener("click", filtrarLancamentos);
    
        // Mostrar ou esconder os filtros
        document.getElementById("toggleFilters").addEventListener("click", () => {
            const filterContainer = document.getElementById("filterContainer");
            filterContainer.style.display = filterContainer.style.display === "none" || filterContainer.style.display === "" ? "flex" : "none";
        });
    
        carregarLancamentos(); // Carregar lançamentos ao iniciar
    </script>
</body>
</html>
