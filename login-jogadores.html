<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'beer-amber': '#F2B705',
                        'beer-foam': '#F5F5F5',
                        'beer-brown': '#8C4303',
                    },
                    animation: {
                        'bubble-up': 'bubble-up 2s ease-in-out infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        'bubble-up': {
                            '0%, 100%': { transform: 'translateY(0)', opacity: '0' },
                            '50%': { transform: 'translateY(-20px)', opacity: '0.8' },
                            '100%': { transform: 'translateY(-40px)', opacity: '0' }
                        },
                        'float': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' }
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full transition-colors duration-300 bg-gradient-to-b from-white to-beer-amber/30 dark:from-gray-900 dark:to-beer-brown/50">
    <!-- Bolhas de cerveja animadas como background -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden opacity-50">
        <div class="bubble animate-bubble-up delay-200" style="left: 10%; top: 90%; width: 15px; height: 15px; border-radius: 50%; background-color: rgba(242, 183, 5, 0.6); position: absolute;"></div>
        <div class="bubble animate-bubble-up delay-700" style="left: 20%; top: 80%; width: 20px; height: 20px; border-radius: 50%; background-color: rgba(242, 183, 5, 0.6); position: absolute;"></div>
        <div class="bubble animate-bubble-up delay-1000" style="left: 30%; top: 85%; width: 12px; height: 12px; border-radius: 50%; background-color: rgba(242, 183, 5, 0.6); position: absolute;"></div>
        <div class="bubble animate-bubble-up delay-500" style="left: 70%; top: 90%; width: 18px; height: 18px; border-radius: 50%; background-color: rgba(242, 183, 5, 0.6); position: absolute;"></div>
        <div class="bubble animate-bubble-up delay-300" style="left: 80%; top: 80%; width: 15px; height: 15px; border-radius: 50%; background-color: rgba(242, 183, 5, 0.6); position: absolute;"></div>
        <div class="bubble animate-bubble-up delay-800" style="left: 90%; top: 85%; width: 22px; height: 22px; border-radius: 50%; background-color: rgba(242, 183, 5, 0.6); position: absolute;"></div>
    </div>

    <div class="flex justify-center items-center min-h-screen p-4">
        <div class="login-container bg-white dark:bg-gray-800 rounded-3xl shadow-2xl p-8 w-full max-w-md transition-all duration-300 hover:shadow-beer-amber/30 dark:hover:shadow-beer-amber/20 transform hover:scale-[1.02] relative overflow-hidden">
            <!-- Espuma da cerveja no topo -->
            <div class="absolute top-0 left-0 right-0 h-4 bg-beer-foam dark:bg-gray-200 flex">
                <div class="h-3 w-3 bg-beer-foam dark:bg-gray-200 rounded-full absolute -bottom-1 left-[5%]"></div>
                <div class="h-3 w-4 bg-beer-foam dark:bg-gray-200 rounded-full absolute -bottom-1 left-[15%]"></div>
                <div class="h-2 w-3 bg-beer-foam dark:bg-gray-200 rounded-full absolute -bottom-1 left-[30%]"></div>
                <div class="h-4 w-4 bg-beer-foam dark:bg-gray-200 rounded-full absolute -bottom-2 left-[45%]"></div>
                <div class="h-3 w-3 bg-beer-foam dark:bg-gray-200 rounded-full absolute -bottom-1 left-[60%]"></div>
                <div class="h-2 w-5 bg-beer-foam dark:bg-gray-200 rounded-full absolute -bottom-1 left-[75%]"></div>
                <div class="h-3 w-4 bg-beer-foam dark:bg-gray-200 rounded-full absolute -bottom-1 left-[90%]"></div>
            </div>
            
            <!-- Logo animado -->
            <div class="flex justify-center mb-6 pt-4">
                <div class="w-90 h-90 flex items-center justify-center rounded-full bg-gradient-to-r from-beer-amber to-yellow-500 dark:from-beer-amber/70 dark:to-yellow-600/70 p-1 animate-float shadow-lg">
                    <div class="w-full h-full rounded-full bg-white dark:bg-gray-800 flex items-center justify-center p-2">
                        <img src="assets/image/logo/SO CEVA.png" alt="Logo Só Ceva" class="max-w-full max-h-full object-contain">
                    </div>
                </div>
            </div>

            <h2 class="text-xl font-bold text-center text-gray-800 dark:text-white mb-6">S.C. Só Ceva</h2>
            
            <form id="login-form" class="space-y-4">
                <div class="relative">
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="Login" 
                        required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-beer-amber transition-all duration-300 text-base"
                    >
                    <span class="absolute top-3 right-3 text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </span>
                </div>
                
                <div class="relative">
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Senha" 
                        required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-beer-amber transition-all duration-300 text-base"
                    >
                    <span class="absolute top-3 right-3 text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </span>
                </div>
                
                <div id="error-message" class="hidden text-red-500 text-sm text-center p-2 rounded-lg bg-red-50 dark:bg-red-900/30"></div>
                
                <button 
                    type="submit" 
                    class="w-full bg-gradient-to-r from-beer-amber to-yellow-500 dark:from-beer-amber/90 dark:to-yellow-600 text-white font-medium py-3 px-4 rounded-lg transition-all duration-300 hover:from-yellow-500 hover:to-beer-amber hover:shadow-lg transform hover:-translate-y-0.5 focus:outline-none"
                >
                    <div class="flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M3 3a1 1 0 011-1h12a1 1 0 011 1v12a1 1 0 01-1 1H4a1 1 0 01-1-1V3zm5 3a1 1 0 112 0v6a1 1 0 11-2 0V6zm5.293-1.293a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 01-1.414-1.414L14.586 10l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                        Entrar
                    </div>
                </button>
            </form>
            
            <!-- Caneca de cerveja decorativa -->
            <div class="flex justify-center mt-6">
                <div class="text-beer-amber dark:text-beer-amber/80 opacity-70">
                    <svg xmlns="http://www.w3.org/2000/svg" width="60" height="40" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M5.5 22h-2c-1.1 0-2-.9-2-2v-7c0-1.1.9-2 2-2h2v11zm15.57-9.34c-.38-.5-.97-.84-1.65-.9L16 11.53V8c0-1.1-.9-2-2-2H8c-1.1 0-2 .9-2 2v14h8c1.1 0 2-.9 2-2v-3.53l3.42-.23c.68-.06 1.27-.4 1.65-.9.38-.5.55-1.15.4-1.8l-.83-3.68c-.15-.65-.32-1.3-.7-1.8zM8.24 18.97h-.04l.03-.03c.01 0 .01.03.01.03zm7.96-3.03c-.31.03-.63.03-.95.03h-6.5v-8h6.5c.32 0 .64 0 .95.04l1.8.26L19.31 14l-1.31 1.68-1.8.26z"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Detectar preferência de tema escuro/claro
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
        
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
            if (event.matches) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        });

        // Adicionar animação CSS para as bolhas
        const style = document.createElement('style');
        style.textContent = `
            @keyframes bubble-up {
                0% { transform: translateY(0); opacity: 0; }
                50% { transform: translateY(-100px); opacity: 0.8; }
                100% { transform: translateY(-200px); opacity: 0; }
            }
            .bubble {
                animation: bubble-up 3s ease-in-out infinite;
            }
            .delay-200 { animation-delay: 0.2s; }
            .delay-300 { animation-delay: 0.3s; }
            .delay-500 { animation-delay: 0.5s; }
            .delay-700 { animation-delay: 0.7s; }
            .delay-800 { animation-delay: 0.8s; }
            .delay-1000 { animation-delay: 1s; }
        `;
        document.head.appendChild(style);

        // Defina um objeto com os logins e senhas dos jogadores
        const jogadores = {
            "bruno": "240190",
            "jogador2": "senha2",
            "jogador3": "senha3",
            // Adicione mais jogadores conforme necessário
        };

        const loginForm = document.getElementById("login-form");
        const errorMessage = document.getElementById("error-message");

        loginForm.addEventListener("submit", function(event) {
            event.preventDefault(); // Impede o envio do formulário

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            
            // Esconder mensagem de erro anterior
            errorMessage.classList.add("hidden");

            // Simular processamento
            const submitButton = this.querySelector('button[type="submit"]');
            submitButton.innerHTML = '<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
            
            setTimeout(() => {
                // Verifica se o login e a senha estão corretos
                if (jogadores[username] && jogadores[username] === password) {
                    // Mostra uma mensagem de sucesso antes de redirecionar
                    submitButton.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>';
                    submitButton.classList.add('bg-green-500');
                    
                    // Redireciona para a página inicial após um curto período
                    setTimeout(() => {
                        window.location.href = "index.html"; // Ajuste para o caminho correto do menu inicial
                    }, 500);
                } else {
                    // Mostra mensagem de erro
                    errorMessage.textContent = "Login ou senha incorretos. Tente novamente.";
                    errorMessage.classList.remove("hidden");
                    
                    // Restaura o botão
                    submitButton.innerHTML = '<div class="flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 011-1h12a1 1 0 011 1v12a1 1 0 01-1 1H4a1 1 0 01-1-1V3zm5 3a1 1 0 112 0v6a1 1 0 11-2 0V6zm5.293-1.293a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 01-1.414-1.414L14.586 10l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>Entrar</div>';
                    
                    // Anima os campos com erro
                    document.getElementById("username").classList.add('shake', 'border-red-500');
                    document.getElementById("password").classList.add('shake', 'border-red-500');
                    
                    // Adiciona animação de shake para os campos com erro
                    const shakeStyle = document.createElement('style');
                    shakeStyle.textContent = `
                        @keyframes shake {
                            0%, 100% { transform: translateX(0); }
                            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                            20%, 40%, 60%, 80% { transform: translateX(5px); }
                        }
                        .shake {
                            animation: shake 0.5s ease-in-out;
                        }
                    `;
                    document.head.appendChild(shakeStyle);
                    
                    // Remove as classes de erro após a animação
                    setTimeout(() => {
                        document.getElementById("username").classList.remove('shake', 'border-red-500');
                        document.getElementById("password").classList.remove('shake', 'border-red-500');
                    }, 500);
                }
            }, 800);
        });

        function voltarParaMenu() {
            window.location.href = "index.html"; // Ajuste para o caminho correto do menu inicial
        }
    </script>
</body>
</html>
